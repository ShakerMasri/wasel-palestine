version: '3.8'
services:
  db:
    image: postgres:15
    container_name: wasel_db
    restart: always
    environment:
      POSTGRES_USER: admin_wasel
      POSTGRES_PASSWORD: wasel1234
      POSTGRES_DB: wasel_palestine
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
